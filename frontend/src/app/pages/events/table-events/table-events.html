<div class="w-full">
  <div class="mb-6">
    <h2 class="text-xl font-semibold" style="color: var(--text)">Eventos históricos</h2>

    <p class="text-sm mt-1" style="color: var(--text-secondary)">
      Consulta y exploración de los eventos naturales registrados por NASA EONET.
    </p>
  </div>

  <div
    class="rounded-xl p-4 shadow-sm border"
    style="background: var(--surface); border-color: var(--navbar-border)"
  >
    <p-table
      [value]="events"
      [loading]="loading"
      [showLoader]="true"
      responsiveLayout="scroll"
      styleClass="w-full"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 25, 50]"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="id" style="width: 90px; cursor: pointer">
            ID
            <p-sortIcon field="id"></p-sortIcon>
          </th>

          <th pSortableColumn="title" style="cursor: pointer">
            Evento
            <p-sortIcon field="title"></p-sortIcon>
          </th>

          <th pSortableColumn="category" style="cursor: pointer">
            Categoría
            <p-sortIcon field="category"></p-sortIcon>
          </th>

          <th pSortableColumn="country" style="cursor: pointer">
            País
            <p-sortIcon field="country"></p-sortIcon>
          </th>

          <th pSortableColumn="event_date" style="width: 170px; cursor: pointer">
            Fecha
            <p-sortIcon field="event_date"></p-sortIcon>
          </th>

          <th class="text-center" style="width: 120px">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-event>
        <tr>
          <td>
            <span class="font-medium" style="color: var(--text)">
              {{ event.id }}
            </span>
          </td>

          <td>
            <div class="flex flex-col">
              <span class="font-medium" style="color: var(--text)">
                {{ event.title }}
              </span>
            </div>
          </td>

          <td>
            <p-tag [value]="event.category" [severity]="getCategorySeverity(event.category)">
            </p-tag>
          </td>

          <td style="color: var(--text)">
            {{ event.country || 'Sin país' }}
          </td>

          <td style="color: var(--text-secondary)">
            {{ event.event_date | date: 'dd/MM/yyyy HH:mm' }}
          </td>

          <td class="text-center">
            <button
              pButton
              type="button"
              severity="info"
              icon="pi pi-eye"
              class="p-button-rounded p-button-text"
              pTooltip="Ver detalle"
              tooltipPosition="top"
              (click)="viewDetail(event)"
            ></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center py-8">No se encontraron eventos.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-event-detail-dialog [(visible)]="showDetailDialog" [selectedEvent]="selectedEvent">
</app-event-detail-dialog>
