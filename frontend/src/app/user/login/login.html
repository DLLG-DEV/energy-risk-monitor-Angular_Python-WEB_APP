<p-toast></p-toast>
<div class="min-h-screen flex items-center justify-center px-6">

    <div class="w-full max-w-md">

        <!-- Card -->

        <div class="rounded-2xl shadow-xl p-8 border surface-card">

            <!-- Logo -->

            <div class="flex flex-col items-center mb-8">

                <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 bg-primary">

                    <i class="pi pi-globe text-3xl text-white"></i>

                </div>

                <h1 class="text-3xl font-bold">
                    Energy Risk Monitor
                </h1>

                <p class="text-center mt-2 text-color-secondary">
                    Inicia sesión para acceder a la plataforma.
                </p>

            </div>

            <!-- Form -->

            <form class="flex flex-col gap-5" [formGroup]="loginForm" (ngSubmit)="login()">

                <!-- Email -->

                <div>

                    <label
                        for="email"
                        class="block mb-2 font-medium">

                        Correo electrónico

                    </label>

                    <span class="p-input-icon-left w-full">

                        <input
                            id="email"
                            formControlName="email"
                            type="email"
                            pInputText
                            class="w-full"
                            placeholder="correo@empresa.com">

                    </span>

                </div>

                <!-- Password -->

                <div>

                    <label
                        for="password"
                        class="block mb-2 font-medium">

                        Contraseña

                    </label>

                    <p-password
                        inputId="password"
                        formControlName="password"
                        [toggleMask]="true"
                        [feedback]="false"
                        placeholder="********"
                        styleClass="w-full"
                        inputStyleClass="w-full">
                    </p-password>

                </div>
                <!-- Botón -->

                <button
                    pButton
                    type="submit"
                    label="Iniciar sesión"
                    icon="pi pi-sign-in"
                    class="w-full">
                </button>

            </form>

            <!-- Divider -->

            <p-divider></p-divider>

            <!-- Registro -->

            <div class="text-center">

                <span class="text-color-secondary">

                    ¿No tienes una cuenta?

                </span>

                <a
                    routerLink="/register"
                    class="ml-2 text-primary font-semibold">

                    Crear cuenta

                </a>

            </div>

        </div>

    </div>

</div>
